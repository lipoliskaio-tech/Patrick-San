<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login - Painel de Licenças</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="static/css/style.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-card">
    <h1 class="h4 mb-1">Painel de Licenças</h1>
    <p class="text-muted mb-4">Acesse com sua conta de administrador</p>

    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input type="text" class="form-control" id="username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <p class="text-muted small mt-4 mb-0">
      Configure a URL da API em <code>static/js/config.js</code>.
    </p>
  </div>

  <script src="static/js/config.js"></script>
  <script src="static/js/api.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById("alertBox");
      alertBox.classList.add("d-none");

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const data = await apiLogin(username, password);
        localStorage.setItem("admin_token", data.access_token);
        window.location.href = "dashboard.html";
      } catch (err) {
        alertBox.textContent = err.message || "Erro ao efetuar login.";
        alertBox.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
