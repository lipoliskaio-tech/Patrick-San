<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Manutenção - Painel de Licenças</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="static/css/style.css" rel="stylesheet">
</head>
<body>
<div id="app"></div>

<script src="static/js/config.js"></script>
<script src="static/js/api.js"></script>
<script src="static/js/layout.js"></script>
<script>
  requireAuth();

  renderLayout("maintenance", `
    <h2 class="mb-4">Modo Manutenção</h2>
    <div class="card stat-card p-4" style="max-width: 600px;">
      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="m_active">
        <label class="form-check-label">Sistema em manutenção (bloqueia login de clientes)</label>
      </div>
      <div class="mb-3">
        <label class="form-label">Mensagem exibida ao cliente</label>
        <textarea class="form-control" id="m_message" rows="3"
          placeholder="Servidor em manutenção. Retornaremos às 18:00."></textarea>
      </div>
      <button class="btn btn-primary" id="saveBtn">Salvar</button>
      <div id="statusMsg" class="mt-3 small text-muted"></div>
    </div>
  `);

  async function load() {
    try {
      const data = await getMaintenance();
      document.getElementById("m_active").checked = data.is_active;
      document.getElementById("m_message").value = data.message || "";
    } catch (err) {
      alert(err.message);
    }
  }

  document.getElementById("saveBtn").addEventListener("click", async () => {
    const payload = {
      is_active: document.getElementById("m_active").checked,
      message: document.getElementById("m_message").value,
    };
    try {
      await setMaintenance(payload);
      document.getElementById("statusMsg").textContent = "Alterações salvas com sucesso.";
    } catch (err) {
      alert(err.message);
    }
  });

  load();
</script>
</body>
</html>
